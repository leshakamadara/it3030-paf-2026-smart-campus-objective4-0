spring:
  application:
    name: smart-campus-api


  datasource:
    url: jdbc:postgresql://localhost:5432/SMCSDB
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false


server:
    port: 8080
    servlet:
      multipart:
        max-file-size: 10MB
        max-request-size: 10MB


cloudinary:



logging:
  level:
    org.springframework.security: DEBUG